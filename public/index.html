<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>안전빵 - 결제 전 후회 막는 AI</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="256x256" href="/logo/bread-256.png">
  <link rel="apple-touch-icon" sizes="128x128" href="/logo/bread-128.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="안전빵">
  <meta property="og:title" content="안전빵 - 결제 전 후회 막는 AI">
  <meta property="og:description" content="식당·카페·병원·미용실까지. AI가 리뷰 100개 읽고 위험 신호 진단">
  <meta property="og:image" content="/logo/bread-512.png">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #37352f;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      line-height: 1.5;
    }
    #root { min-height: 100vh; }
    button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    input, textarea { font-family: inherit; -webkit-appearance: none; }
    a { color: inherit; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slide-in { from { opacity: 0; transform: translateY(-8px);} to { opacity: 1; transform: translateY(0);}}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react" src="/app.js"></script>
</body>
